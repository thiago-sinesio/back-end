# application.yml
# Configuração principal de infraestrutura para a aplicação Spring Boot.
# Este arquivo define perfis dev/prod, CORS e multipart upload.

# Perfil padrão de desenvolvimento
spring:
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev

  # Banco de dados local para desenvolvimento (PostgreSQL com pgvector)
  datasource:
    url: jdbc:postgresql://localhost:5433/chat_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgrespassword


  # JPA/Hibernate em modo de desenvolvimento
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

app:
  cors:
    # Frontend React localizado em localhost:5173
    allowed-origins:
      - http://localhost:5173
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600

  upload:
    # Diretório local padrão para arquivos enviados
    dir: ./uploads
    max-file-size: 10485760
    allowed-types:
      - application/pdf
      - text/plain
    allowed-extensions:
      - .pdf
      - .txt

  ai:
    url: ${AI_URL:http://localhost:11434/v1}
    api-key: ${AI_API_KEY:ollama}
    model:
      chat: ${AI_CHAT_MODEL:llama3.2}
      embedding: ${AI_EMBEDDING_MODEL:nomic-embed-text}

  n8n:
    webhook-url: ${N8N_WEBHOOK_URL:http://localhost:5678/webhook-test/document-ingested}

logging:
  level:
    root: INFO
    com.chat: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: prod

  # Banco de dados relacional para produção
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chat_db}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    initialization-mode: never

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

app:
  cors:
    allowed-origins:
      - http://localhost:5173
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600

  upload:
    dir: ${UPLOAD_DIR:./uploads}
    max-file-size: 10485760
    allowed-types:
      - application/pdf
      - text/plain
    allowed-extensions:
      - .pdf
      - .txt

logging:
  level:
    root: INFO
    com.chat: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
